input {
  beats {
    port => 5044
  }
}

filter {
  # Проверяем, содержит ли log поле JSON структуру
  if [log] {
    # Пытаемся парсить как JSON, если возможно
    json {
      source => "log"
      target => "parsed"
      skip_on_invalid_json => true
    }
  }
  
  # Переименовываем поля Docker логов для удобства
  mutate {
    rename => { "stream" => "docker_stream" }
    rename => { "time" => "docker_time" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "laravel-logs-%{+YYYY.MM.dd}"
  }
  
  # Для отладки
  stdout {
    codec => rubydebug
  }
}